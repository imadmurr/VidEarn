<svg width="100%" viewBox="0 0 680 510" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>VidEarn — system architecture</title>
  <desc>Three-tier architecture: application layer (VidEarn Android App and Admin Panel), Firebase backend (Auth, Firestore, FCM, Cloud Functions), and external services (survey SDKs, AdMob, payout providers).</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, sans-serif; }
      .tier        { fill: #F7F6F3; stroke: #C4C2B8; stroke-width: 0.5; stroke-dasharray: 5 3; }
      .tier-label  { fill: #888780; font-size: 11px; letter-spacing: 0.04em; }
      .teal-box    { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
      .teal-h      { fill: #085041; font-size: 14px; font-weight: 600; }
      .teal-b      { fill: #0F6E56; font-size: 12px; }
      .purple-box  { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
      .purple-h    { fill: #3C3489; font-size: 14px; font-weight: 600; }
      .purple-b    { fill: #534AB7; font-size: 12px; }
      .blue-box    { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
      .blue-h      { fill: #0C447C; font-size: 14px; font-weight: 600; }
      .blue-b      { fill: #185FA5; font-size: 12px; }
      .coral-box   { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
      .coral-h     { fill: #712B13; font-size: 14px; font-weight: 600; }
      .coral-b     { fill: #993C1D; font-size: 12px; }
      .amber-box   { fill: #FAEEDA; stroke: #854F0B; stroke-width: 0.5; }
      .amber-h     { fill: #633806; font-size: 14px; font-weight: 600; }
      .amber-b     { fill: #854F0B; font-size: 12px; }
      .arr         { stroke: #5F5E5A; stroke-width: 1.2; fill: none; }
      .arr-dashed  { stroke: #B4B2A9; stroke-width: 1; fill: none; stroke-dasharray: 4 3; }
      .arr-label   { fill: #5F5E5A; font-size: 11px; }
    </style>
  </defs>

  <!-- ── TIER 1 · APPLICATION ───────────────────────────────────── -->
  <rect x="10" y="10" width="660" height="192" rx="8" class="tier"/>
  <text x="24" y="26" class="tier-label">APPLICATION</text>

  <!-- VidEarn Android App -->
  <rect x="26" y="34" width="368" height="152" rx="10" class="teal-box"/>
  <text x="210" y="60"  text-anchor="middle" dominant-baseline="central" class="teal-h">VidEarn Android App</text>
  <text x="210" y="82"  text-anchor="middle" dominant-baseline="central" class="teal-b">Kotlin · MVVM · ViewBinding · Koin DI</text>
  <text x="210" y="100" text-anchor="middle" dominant-baseline="central" class="teal-b">Navigation Components · Coroutines · FCM</text>
  <text x="210" y="118" text-anchor="middle" dominant-baseline="central" class="teal-b">targetSdk 34 · minSdk 23 · 51 releases</text>
  <text x="210" y="140" text-anchor="middle" dominant-baseline="central" class="teal-b">local: :wheelSpin · :KiwiSDK</text>

  <!-- Admin Panel -->
  <rect x="410" y="34" width="244" height="152" rx="10" class="purple-box"/>
  <text x="532" y="60"  text-anchor="middle" dominant-baseline="central" class="purple-h">Admin Panel</text>
  <text x="532" y="82"  text-anchor="middle" dominant-baseline="central" class="purple-b">Jetpack Compose</text>
  <text x="532" y="112" text-anchor="middle" dominant-baseline="central" class="purple-b">User management</text>
  <text x="532" y="130" text-anchor="middle" dominant-baseline="central" class="purple-b">Payout approval</text>
  <text x="532" y="148" text-anchor="middle" dominant-baseline="central" class="purple-b">Broadcast notifications</text>

  <!-- ── TIER 2 · BACKEND ───────────────────────────────────────── -->
  <rect x="10" y="222" width="660" height="118" rx="8" class="tier"/>
  <text x="24" y="238" class="tier-label">BACKEND — FIREBASE</text>

  <rect x="26"  y="246" width="142" height="56" rx="8" class="blue-box"/>
  <text x="97"  y="267" text-anchor="middle" dominant-baseline="central" class="blue-h">Auth</text>
  <text x="97"  y="285" text-anchor="middle" dominant-baseline="central" class="blue-b">Sign-in · sign-up</text>

  <rect x="184" y="246" width="142" height="56" rx="8" class="blue-box"/>
  <text x="255" y="267" text-anchor="middle" dominant-baseline="central" class="blue-h">Firestore</text>
  <text x="255" y="285" text-anchor="middle" dominant-baseline="central" class="blue-b">User data · payouts</text>

  <rect x="342" y="246" width="142" height="56" rx="8" class="blue-box"/>
  <text x="413" y="267" text-anchor="middle" dominant-baseline="central" class="blue-h">FCM</text>
  <text x="413" y="285" text-anchor="middle" dominant-baseline="central" class="blue-b">Push notifications</text>

  <rect x="500" y="246" width="142" height="56" rx="8" class="blue-box"/>
  <text x="571" y="267" text-anchor="middle" dominant-baseline="central" class="blue-h">Cloud Functions</text>
  <text x="571" y="285" text-anchor="middle" dominant-baseline="central" class="blue-b">S2S validation</text>

  <!-- ── TIER 3 · EXTERNAL SERVICES ────────────────────────────── -->
  <rect x="10" y="362" width="660" height="130" rx="8" class="tier"/>
  <text x="24" y="378" class="tier-label">EXTERNAL SERVICES</text>

  <rect x="26"  y="386" width="114" height="60" rx="8" class="coral-box"/>
  <text x="83"  y="408" text-anchor="middle" dominant-baseline="central" class="coral-h">BitLabs</text>
  <text x="83"  y="428" text-anchor="middle" dominant-baseline="central" class="coral-b">Surveys</text>

  <rect x="152" y="386" width="114" height="60" rx="8" class="coral-box"/>
  <text x="209" y="408" text-anchor="middle" dominant-baseline="central" class="coral-h">CPXResearch</text>
  <text x="209" y="428" text-anchor="middle" dominant-baseline="central" class="coral-b">Surveys</text>

  <rect x="278" y="386" width="114" height="60" rx="8" class="coral-box"/>
  <text x="335" y="408" text-anchor="middle" dominant-baseline="central" class="coral-h">CpaLead</text>
  <text x="335" y="428" text-anchor="middle" dominant-baseline="central" class="coral-b">Offers</text>

  <rect x="404" y="386" width="114" height="60" rx="8" class="coral-box"/>
  <text x="461" y="408" text-anchor="middle" dominant-baseline="central" class="coral-h">AdMob</text>
  <text x="461" y="428" text-anchor="middle" dominant-baseline="central" class="coral-b">Display ads</text>

  <rect x="530" y="386" width="130" height="60" rx="8" class="amber-box"/>
  <text x="595" y="408" text-anchor="middle" dominant-baseline="central" class="amber-h">Payouts</text>
  <text x="595" y="428" text-anchor="middle" dominant-baseline="central" class="amber-b">Crypto &amp; Gift cards</text>

  <!-- ── ARROWS ─────────────────────────────────────────────────── -->

  <!-- App ↔ Firebase (bidirectional) -->
  <line x1="210" y1="186" x2="210" y2="222" class="arr"
        marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="214" y="207" class="arr-label">Firebase SDK</text>

  <!-- Admin → Firebase -->
  <line x1="532" y1="186" x2="532" y2="222" class="arr"
        marker-end="url(#arrow)"/>

  <!-- SDK integration: App → External (left-margin routing, dashed) -->
  <path d="M 26 110 L 14 110 L 14 392 L 26 392" class="arr-dashed"
        marker-end="url(#arrow)"/>

  <!-- S2S postbacks: External → Cloud Functions (upward) -->
  <line x1="571" y1="362" x2="571" y2="302" class="arr"
        marker-end="url(#arrow)"/>
  <text x="575" y="352" class="arr-label">S2S postbacks</text>

</svg>
